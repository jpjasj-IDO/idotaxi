kind = "web"
previewPath = "/"
title = "I DO TAXI Lebanon"
version = "1.0.0"
id = "artifacts/idotaxi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18228

[services.development]
run = "pnpm --filter @workspace/idotaxi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/idotaxi", "run", "build" ]
publicDir = "artifacts/idotaxi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18228"
BASE_PATH = "/"
